# Copy this file to .github/workflows/ for GitHub Actions to pick it up.

name: Fetch SMR Forecasts

on:
  push:
    branches:
      - main
  schedule:
    - cron: '45 10 * * *'   # 10:45 UTC daily — GEFS 06Z available ~10-11Z; CBRFC uses prior day 15Z
    - cron: '45 11 * * *'   # 11:45 UTC daily — backup run if 11Z fetch failed or data was not yet available
  workflow_dispatch:
    inputs:
      date:
        description: 'Initialization date (YYYY-MM-DD); defaults to today'
        required: false
        default: ''

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r data_submodule/get_forecasts/requirements.txt

      - name: Fetch GEFS forecast
        uses: nick-fields/retry@v3
        env:
          GEFS_OUTPUT_DIR: ${{ github.workspace }}/data_submodule/forecasts/GEFS_operational
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_wait_seconds: 60
          command: |
            mkdir -p "$GEFS_OUTPUT_DIR"
            if [ -n "${{ github.event.inputs.date }}" ]; then
              python data_submodule/get_forecasts/realtime_herbie_smr.py --date "${{ github.event.inputs.date }}"
            else
              python data_submodule/get_forecasts/realtime_herbie_smr.py
            fi

      - name: Fetch CBRFC BAKC2 forecast
        uses: nick-fields/retry@v3
        env:
          CBRFC_OUTPUT_DIR: ${{ github.workspace }}/data_submodule/forecasts/CBRFC_operational
        with:
          timeout_minutes: 5
          max_attempts: 2
          retry_wait_seconds: 60
          command: |
            mkdir -p "$CBRFC_OUTPUT_DIR"
            if [ -n "${{ github.event.inputs.date }}" ]; then
              python data_submodule/get_forecasts/fetch_cbrfc_bakc2.py --date "${{ github.event.inputs.date }}"
            else
              python data_submodule/get_forecasts/fetch_cbrfc_bakc2.py
            fi

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true          # binaries on Linux

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            targets, fs, tarchetypes, crew,
            dplyr, purrr, lubridate, readr, stringr, tibble, tidyr,
            httr2, rvest, yaml, dataRetrieval

      - name: Run targets pipeline
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 2
          max_attempts: 2
          retry_wait_seconds: 60
          command: Rscript -e "targets::tar_make()"

      - name: Commit and push forecast data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_submodule/forecasts/ data_submodule/raw_data/target_output/
          git diff --cached --quiet && echo "No new forecast files to commit." || \
            git commit -m "chore: add forecast data for ${{ github.event.inputs.date || 'today' }} [skip ci]"
          git push
